<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Fleet Test</title>
</head>
<body>

<h1>Car Fleet</h1>
<div id="fleet"></div>

<script>
function escHtml(str) {
  return str.replace(/[&<>"']/g, function(m) {
    return {
      "&": "&amp;",
      "<": "&lt;",
      ">": "&gt;",
      '"': "&quot;",
      "'": "&#039;"
    }[m];
  });
}

async function loadFleet() {
  const res = await fetch("fleet.json");
  const cars = await res.json();
  renderFleet(cars);
}

function loadFleet() {
  const data = localStorage.getItem("fleet");

  if (!data) {
    const defaultFleet = [
      {
        id: 1,
        name: "Dacia Logan",
        category: "Economy",
        price: 250,
        available: true
      }
    ];
    localStorage.setItem("fleet", JSON.stringify(defaultFleet));
    renderFleet(defaultFleet);
  } else {
    renderFleet(JSON.parse(data));
  }
}

document.addEventListener("DOMContentLoaded", loadFleet);
</script>

</body>

</html>
