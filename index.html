<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Car Fleet</title>
</head>
<body>

<h1>Available Cars</h1>
<div id="fleet"></div>

<script>
function escHtml(str) {
  return str.replace(/[&<>"']/g, function(m) {
    return {
      "&": "&amp;",
      "<": "&lt;",
      ">": "&gt;",
      '"': "&quot;",
      "'": "&#039;"
    }[m];
  });
}

function renderFleet(cars) {
  const container = document.getElementById("fleet");

  const availableCars = cars.filter(car => car.available);

  if (availableCars.length === 0) {
    container.innerHTML = "<p>No cars available</p>";
    return;
  }

  container.innerHTML = availableCars.map(car => `
    <div style="border:1px solid black;padding:10px;margin:10px;">
      <h3>${escHtml(car.name)}</h3>
      <p>Category: ${escHtml(car.category)}</p>
      <strong>${car.price} MAD/day</strong>
    </div>
  `).join("");
}

function loadFleet() {
  const data = localStorage.getItem("fleet");

  if (!data) {
    const defaultFleet = [
      {
        id: 1,
        name: "Dacia Logan",
        category: "Economy",
        price: 250,
        available: true
      }
    ];
    localStorage.setItem("fleet", JSON.stringify(defaultFleet));
    renderFleet(defaultFleet);
  } else {
    renderFleet(JSON.parse(data));
  }
}

document.addEventListener("DOMContentLoaded", loadFleet);
</script>

</body>
</html>
