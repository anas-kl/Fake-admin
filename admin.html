<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Admin Panel</title>
</head>
<body>

<h1>Admin Dashboard</h1>

<h3>Add New Car</h3>

<input id="name" placeholder="Car Name"><br><br>
<input id="category" placeholder="Category"><br><br>
<input id="price" type="number" placeholder="Price"><br><br>

<button onclick="addCar()">Add Car</button>

<h3>Current Cars</h3>
<div id="carList"></div>

<script>
let fleet = [];

function escHtml(str) {
  return str.replace(/[&<>"']/g, function(m) {
    return {
      "&": "&amp;",
      "<": "&lt;",
      ">": "&gt;",
      '"': "&quot;",
      "'": "&#039;"
    }[m];
  });
}

function loadFleet() {
  const data = localStorage.getItem("fleet");
  fleet = data ? JSON.parse(data) : [];
  renderCars();
}

function saveFleet() {
  localStorage.setItem("fleet", JSON.stringify(fleet));
}

function addCar() {
  const name = document.getElementById("name").value.trim();
  const category = document.getElementById("category").value.trim();
  const price = Number(document.getElementById("price").value);

  if (!name || !category || !price) {
    alert("All fields are required");
    return;
  }

  const newCar = {
    id: Date.now(),
    name,
    category,
    price,
    available: true
  };

  fleet.push(newCar);
  saveFleet();
  renderCars();

  document.getElementById("name").value = "";
  document.getElementById("category").value = "";
  document.getElementById("price").value = "";

  alert("Car saved successfully!");
}

function deleteCar(id) {
  fleet = fleet.filter(car => car.id !== id);
  saveFleet();
  renderCars();
}

function toggleAvailability(id) {
  const car = fleet.find(car => car.id === id);
  if (car) {
    car.available = !car.available;
    saveFleet();
    renderCars();
  }
}

function renderCars() {
  const container = document.getElementById("carList");

  if (fleet.length === 0) {
    container.innerHTML = "<p>No cars added yet</p>";
    return;
  }

  container.innerHTML = fleet.map(car => `
    <div style="border:1px solid gray;padding:10px;margin:10px;">
      <strong>${escHtml(car.name)}</strong><br>
      Category: ${escHtml(car.category)}<br>
      Price: ${car.price} MAD<br>
      Available: ${car.available ? "Yes" : "No"}<br><br>
      <button onclick="toggleAvailability(${car.id})">
        Toggle Availability
      </button>
      <button onclick="deleteCar(${car.id})">
        Delete
      </button>
    </div>
  `).join("");
}

document.addEventListener("DOMContentLoaded", loadFleet);
</script>

</body>
</html>
